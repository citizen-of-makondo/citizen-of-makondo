name: Generate Metrics

on:
  schedule:
    - cron: "0 6 * * *"     # once a day, 06:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # ── Main card: stats, activity, languages, contribution calendar ──
      - name: Overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: citizen-of-makondo
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Achievements card (replaces the old trophies) ──
      - name: Achievements metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: citizen-of-makondo
          filename: assets/achievements.svg
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
