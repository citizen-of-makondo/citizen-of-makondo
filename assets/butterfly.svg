<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 40" width="22" height="18" role="img" aria-label="yellow butterfly">
  <defs>
    <radialGradient id="wing" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#FFF3B0"/>
      <stop offset="55%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </radialGradient>
  </defs>
  <g stroke="#6b4a00" stroke-width="1.1" stroke-linejoin="round">
    <!-- left wings -->
    <path fill="url(#wing)" d="M23 20C15 6 4 4 3 12c-1 7 6 9 12 9 4 0 6-0.5 8-1z"/>
    <path fill="url(#wing)" d="M23 20C16 30 6 34 4 27c-1.6-6 6-8 11-8 3 0 6 0.4 8 1z"/>
    <!-- right wings -->
    <path fill="url(#wing)" d="M25 20C33 6 44 4 45 12c1 7-6 9-12 9-4 0-6-0.5-8-1z"/>
    <path fill="url(#wing)" d="M25 20C32 30 42 34 44 27c1.6-6-6-8-11-8-3 0-6 0.4-8 1z"/>
  </g>
  <!-- wing spots -->
  <g fill="#F0A500" opacity="0.7">
    <circle cx="11" cy="12" r="1.6"/>
    <circle cx="11" cy="27" r="1.6"/>
    <circle cx="37" cy="12" r="1.6"/>
    <circle cx="37" cy="27" r="1.6"/>
  </g>
  <!-- body -->
  <rect x="23" y="9" width="2" height="22" rx="1" fill="#3a2a00"/>
  <!-- antennae -->
  <g stroke="#3a2a00" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M24 10C22 6 20 5 18 4"/>
    <path d="M24 10C26 6 28 5 30 4"/>
